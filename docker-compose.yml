# Local Kafka for development and testing
# Usage: docker compose up -d
# Then run your app; config.json already uses localhost:9092

services:
  kafka:
    image: bitnamilegacy/kafka:latest
    container_name: airpol-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode (no Zookeeper); single node
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
